name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        # 기존 코드에 남은 lint 에러가 있어 경고로만 취급 (신규 에러는 코드리뷰에서 관리)
        continue-on-error: true

      - name: Build
        run: npm run build
